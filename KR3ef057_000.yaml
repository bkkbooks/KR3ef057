body:
  text: 中風兼傷寒論晨窗雪霽光射四壁張子被褐方起誦雪嶠熟煮春風劈爛椽之句客有量屐過我而進苦雪篇者中有凍餒相繼倒一語憮然久之因呼從事爐頭相與平章風雅杯霽內論及醫道之難而傷寒為最難傷寒而挾雜病者尤難是以亙古絕無兼該之例後世不能兼善其術也余曰安有滔滔江漢不通潮汐者乎苟能純一其道則圓機在我活法隨人何慮兼症之不克哉客舉手稱善請析中風兼傷寒義始問中經絡兼傷寒曰傷寒邪從外入中風風從內召雖同具汗下和解之法而虛實之機微有不同傷寒悉從外邪起見故必分營衛經絡一毫不可混淆中風外內合邪故攻表必兼養正如小續命中芎歸參附之類即兼傷寒者亦當顧慮正氣為主若率意攻表則營熱轉甚在裡之津液勢必隨表藥外泄而為燥癢枯竟之症矣問中血脈曰中血脈即傷寒之半表半裡症傷寒邪未深入但須和解中風陰血先虧故必養血兼除風熱所謂血行風自滅是也在兼傷寒者和解藥中稍加調血之味以滋血燥不得任用滋陰涼血之藥問中腑兼傷寒曰中腑多見閉症與傷寒之裡實脹閉不殊傷寒邪熱入腑灼爍陰津故用承氣以泄其熱不得雜一味表藥恐引熱勢上蒸也中風是裡熱生風木邪乘土故攻裡必兼祛風熱如三化湯中用羌活之義閉症而見痰鳴喘脹面赤口張為正氣暴絕此必不治問中臟兼傷寒曰中臟多見脫症與直中陰經之自利無異古法用三生飲治脾肺之中地黃飲子治腎肝之中侯氏黑散治心與包絡之中然用以治臟虛受邪之證誠為聖藥若卒中昏迷手撒遺尿真陰失守之脫症雖有合劑不能復起況兼傷於寒者乎問類中兼傷寒曰類中大綱有三曰氣衰曰火暴曰痰逆總皆陽虛邪害空竅所致河間之地黃飲子為下虛上盛陰火暴逆而設東垣之三生飲為脾肺氣衰痰積於中而設丹溪之星香二陳為形盛氣阻痰盛於外而設在兼傷寒者三法俱不可效惟和營衛中隨症加養氣導火豁痰之藥斯為兼得之法問中風本有六經形證與兼感客邪何異曰中風六經形證是指口眼喎斜肢體麻瞀等症而言與傷寒六經見症不同然亦間有惡寒發熱之候但中風雖有惡寒必常時凜凜或經日不止不似外感之驟然惡寒發熱如燔也中風雖有火炎痰濕頭痛必時甚時減或晝甚或夜甚不似外感之頓然發熱大痛晝夜不分也中風雖有肢體煩疼必麻痹不仁或久臥床褥所致不似外感之忽然壯熱無汗骨節煩疼也中風雖有表虛自汗必時常濈濈不似外感之驀然發熱頭痛自汗也中風雖有往來寒熱必常常若此不似外感之發熱頭痛三四日而轉入少陽也中風雖有大便枯約必平昔至圊艱難不似外感之大熱數日熱邪入里而燥結不通也中風雖有小水短澀必向來不利或見頻數不似外感之熱結膀胱煩渴引飲小腹脹閉也以此審辨則中風之本症兼症可瞭然心目矣問有年少體肥之人平素左半身無汗脅下一片常冷數日前索逋下鄉是日天氣暴寒舟中食飯一著隨食隨冷便覺凜凜畏寒登崖失足顛仆扶挾解帶而寢是夜即發熱頭痛喘鳴胸滿遍體煩疼腰脊左脅尤甚左半身不能轉動仍冷不熱手足亦微冷第三日扶病而歸其脈左手弦細右手遲滑絕不似外感之候因見脈弦脅痛與小柴胡二服不應又似半肢風廢與小續命亦不應檢方書中半身無汗例當二陳四物合用按法治之亦無效今舌上微有薄苔而左畔白滑右畔微黃得病後大便已去二次去亦無多小便略見黃澀究竟此屬何症當與何藥曰此人素有寒飲結聚脅下更兼內外感寒加以驚僕痰逆則發熱喘鳴頭痛胸滿身疼勢所必至其右半經脈貫通處受邪則從陽而化為熱左半寒飲積結之界平時尚且無汗縱有寒邪湊泊亦必從陰而釀寒陽氣不到之所自然重著難移陽氣不行於脈自然弦細搏指至於右脈遲滑手足微寒皆緣脾氣向衰熱勢不盛所以舌苔不能幹燥大便不能結硬其小便黃澀一證難因肺胃氣化不行亦見下焦真陽未艾斯人向後必夭目今尚可挽回當與五積散晝夜三進總藉辛溫解散之力可以內消寒滯中溫血脈外逐表邪一舉而有三得其外可用白芥子川烏姜滓炙熱包熨之候表邪分解裡氣調和然後用六君子加辛附薑桂之屬徐溫中氣可也虛勞兼傷寒論問虛勞之人兼感風寒者何以辨之曰必先明受病之三綱見症之五常然後參詳脈症以辨客邪三綱者房勞傷思郁傷藥物傷五常者骨蒸咳嗽吐血泄瀉男子失精女子不月此皆本病之常他症雖繁莫如此五者為甚如平時骨蒸勞熱時重時輕火炎則面熱頰赤兩角隱隱掣痛忽然壯熱頭疼不分晝夜是感客邪也平時咳嗽聲怯痰涎不應忽然鼻塞聲重涕唾稠黏是感客邪也平時關尺脈弦忽然人迎浮盛是感客邪也醫不達此每認本病變重日與調補助邪深入傷殘之餘立刻告竭究竟不知其為風寒而反歸咎於飲食居處不亦冤乎問房勞傷者先見何症兼容邪者當用何藥曰房勞傷者作強太過而傷其先天也世俗謂之陰虛而實兼傷陰中陽氣故曰先天若云腎本受傷致病則有質之精依然後天水穀所化安得謂之先天乎惟素稟虛寒陽氣不振恣餌金石熱毒入於腎臟傷耗真陰者乃為陰虛其症皆從下而上由腎肝而至於脾或先失血或見遺精次見咳嗽骨蒸等症真陽虧者乏氣少食後見泄瀉而危真陰虧者強中熱必發臃腫而斃故治本病之陽虛八味腎氣異功保元等藥兼外感者黃耆建中本病之陰虛六味都氣補陰虎潛之類有藥毒者滋腎丸洗滌之兼容邪者小建中加丹皮先吐血者為營血受傷黃耆建中加當歸先遺精者為封臟不固桂枝加龍骨牡蠣湯雖有外邪無逾上法但須參邪之盛衰從少從多以為活法可也問思郁所傷較斫喪所致者孰重孰輕證治與房勞何異曰斫喪是精氣受傷可用填補之劑思郁是神氣受困七情之火交煎真陰不久告匱豈藥石之所能療哉惟早適其志為第一義此病起於腎關乎心而迫肺傷肝及脾再交水火謂之七傳初起骨蒸乾咳繼則亡血失精女子不月至死而面色不衰以其陰火蒸騰津液於上所以肢體日削神采愈鮮不似房勞之精氣先傷而形神枯索也在初起真陰未耗時急宜調治如地黃丸逍遙散歸脾湯之類若經閉不行而氣體尚強可用玉燭散疏滌其熱次以金匱下瘀血湯作丸歸脾湯下之倒經血溢於上者亦然男子失血遺清都氣丸加鰾膠與四烏鰂骨一藘茹丸間服有外感者通宜小建中湯加大劑牡丹皮服後熱不除合當歸補血湯自止若誤與羌防升柴等藥多致昏熱痞悶變害不測慎之慎之問醫藥傷者傷在何經治用何藥更加傷寒尚可一回否曰此皆表邪發散不清病留肺絡而咳嗽纏綿醫者不察認陰虛肺熱而與寒涼清肺降火滋陰其邪從皮毛入肺而及心胃為從上而下亦有因寒涼傷胃胃輸寒氣於肺咸必先嗽而後寒熱也復有風熱認作風寒誤投辛散而傷少陰之經者必先咳唾膿血而後泄利又有汗下太過失於調養而成此則營衛受傷必先微寒數熱而後咳嗽凡此皆能致虛若於本門求治百不一效惟用傷寒搜滌之法庶或可圖但得形氣未衰脈症相符從加客症亦有成法如邪留肺絡而喘咳不休脈見浮緊浮數者大小青龍射干麻黃選用喘咳有血者和劑款冬花散之類服二三劑而見鼻塞聲重有似傷風之狀者此邪從上泄也即當以保元異功少加細辛調理中氣兼六味丸加桂枝滋其下元若服二三劑不應反加喘咳脈疾或腹痛聲啞者難已如寒涼傷胃而咳畏寒少食氣口脈見緊細沉弦大劑桂枝人參湯服四五劑而見下血或有積沫小腹微痛喜得溫按者邪從下泄也小劑理中湯和之七日不止者難治風熱誤用辛溫者麻黃升麻湯葳蕤湯消風散隨輕重而施已上等法皆是因風寒久伏故與兼客邪者同治惟汗下太過者當助正氣如十全大補大建中人參養營酌用倘邪乘虛入而見表症新加湯桂枝加附子湯柴胡桂枝湯諒寒熱施治可也問虛勞之因不同而所見之症則一其故何也曰致病之因雖異其所受病者不過陰陽血氣而已故凡治療必察陰陽如骨蒸勞熱之晡發夜盛善渴易飢者陰虛也晝日煩熱至夜稍安者陽虛也咳嗽咽乾咳甚略有黏痰者陰虛也嗽多清痰嗽甚則嘔水者陽虛也吐血紫赤濃厚光澤或有結塊星縷者陰虛也血色晦淡無光吐久不凝或雖有瘀結多帶痰水者陽虛也瀉臭穢身煩熱渴或兼膿血者陰虛也瀉下純清水或白沫者陽虛也失精夢寐不寧二便引急陰虛也陰頭寒而精出不知或溺後常有滑精者陽虛也經閉發熱咳嗽五心煩熱者陰虛也少腹引痛而背微惡寒者陰氣有餘循經而乘陽位必有乾血若經雖不行但少食倦怠腰腹不痛者陽虛也陽虛則氣衰不能生血經雖不通必無結血此病機之最要者勿以其繁而忽諸大都陰虛則熱陽虛則寒陰陽俱虛則寒熱之症錯亂而見又當審其偏勝而為處方設不知此日以不寒不熱之劑投之則偏者愈偏勝者愈勝永無均適之期矣故智者臨病務在調其所偏察其所變診察之際其脈忽然鼓大症異平時便當推原飲食起居以辨客邪有無之應又有忽然惡寒發熱脈無常候乃陰陽倚伏亢極反害之大虛症豈可一認風寒而與開泄不旋踵而告變矣歷觀此症但陽虛可服參耆者十全五六陰虛不服參耆者十難救一若年在三旬以外者其人質干已固尚可斡旋如在二十上下非特筋骨柔脆抑且情形難制縱極力圖治終難克效中滿腫脹兼傷寒論問脹滿兼傷寒當與何藥曰先察其脹之屬寒屬熱詳其邪之在表在裡方可議藥問脹諸腹大皆屬於熱恐無屬寒之理曰曷觀罈中之水冰則脹脹甚則裂豈非寒極脹閉之一驗乎問脹滿之寒熱何以為辨曰諸病水液澄澈清冷皆屬於寒水液渾濁皆屬於熱然亦有本寒標熱而大便不實小便赤澀者大抵中滿當辨痰飲食積水腫當辨陰水陽水鼓脹當辨氣血蟲積此為大綱問腫脹之表證寒者何治熱者何治曰中滿腫脹之人痰濕素盛中氣先傷更加傷寒未有不先犯胸膈而為煩擾不寧喘脹嘔逆之患外證雖有頭疼發熱人迎未必緊盛然往往有氣口反大於人迎者倘醫者不加辨察只認本病變重而與清熱利水恣邪深入輾轉誤藥不死不已邪在表時切不可動其痼疾亦不可恣用表藥惟當和其營衛為主如寒脹用桂枝加附子湯五積散熱脹用桂枝加厚朴杏仁子湯芎蘇散之類本寒燥熱者膀胱津氣大虧切不可用利水藥惟茯苓桂枝白朮甘草湯加蔥白最當若溺閉小腹硬滿者合用春澤湯以五苓開結導水四君滋其化源此瀉中寓補之義也問見半表裡症何治曰此病本在裡邪復向里如大小柴胡之類此後無妨礙問見里症何治曰宿病雖有虛實寒熱之不同若更加外邪乘機內入雖正氣本虛亦當微導以泄其熱或通幽門或疏水道隨其攸利若以其虛而禁攻則邪氣流連漫無解期矣至於真元虛憊者神丹亦不可復起也問中滿水腫鼓脹兼傷寒者治各有異否曰三者皆屬裡症咸禁升發而中滿者汗劑中宜加痰氣之藥則不致於逆滿水腫則可用開鬼門之法惟極虛陰水與陰本陽標者戒汗若鼓脹則大忌發汗當理中兼調營衛多有浹然汗出而解者若用表劑則熱轉劇脹反甚必無得汗之理至其傳裡當各隨本病之氣血痰水兼以養正藥治之慎勿以其虛而驟進壅補亦不可脹而擅用峻攻此治虛中實邪之大法也噎膈反胃兼傷寒論問噎膈反胃異名同類倘復為客邪所傷其治亦彷彿否曰噎者食即帶痰而出有時屈曲而下膈者膈塞閉絕上下不通反胃者飲食如常後必傾囊而出三症雖各有辨而致病之由總不離乎鬱結故其治亦不甚相遠潔古以上焦吐者從乎氣言食則暴吐心下嘈雜皆痰飲鬱火所致中焦吐者從乎積每吐則膈間隱隱刺痛必有死血好飲熱酒人每多犯此若默默如癡者為蟲積靈樞所謂蟲為下膈是也下焦吐者從乎寒食久不消經日必吐乃火衰不能生土土不制水之候王太僕云食不得入是有火也食入反出是無火也觀噎膈反胃症雖不一其可治不可治可一言而知在老人中氣久衰血液枯槁更加鬱結而成真膈者即不兼傷寒百不一療惟血氣未衰之人因痰飲死血搏結為患者縱加表症尚可圖治其症雖發熱頭痛而足必冷傷於寒則鼻燥身疼而脈微緊中於風則鼻鳴乾嘔而脈微數以中氣久衰不能鼓搏其脈熱勢亦不能盛與鼓脹之中蘊濕熱者不同是以辨治尤難治此者雖當散邪為急然必先安中氣如甘草乾薑湯加桂枝薑棗之類切不可雜一味耗氣破血攻伐宿病之藥若胃虛而逆大半夏湯藿香安胃散皆以人參助胃氣行藥力也胃中痰濕上逆腸鳴膈痞者半夏瀉心湯以乾薑黃連和其寒熱則不致於抗格也反胃嘔吐而渴欲飲水者茯苓澤瀉湯以澤瀉引桂枝乾薑之辛入膀胱行布水精於五經也若腎虛水逆而嘔金匱腎氣丸減半地黃偌用桂枝兼散邪以收攝之熱吐酸水噦逆枳皮竹茹湯下佐金丸如見里證不妨用下奪之法使氣下而不上正與本病相合如半夏生薑大黃湯人參利膈丸皆可應用但胃中寒冷者又為切戒故仲景有客熱不能消穀胃中寒冷則吐之論當效理中加枳實加附子等法治之內傷兼傷寒論問勞力感寒與傷寒症治何異曰勞力是內傷其氣氣傷者補之傷寒是外傷其形形傷者瀉之此形氣俱傷內虛外實有攻補兩難之勢復有兼停宿食者尤為扼腕設醫者宿無成見於胸中必致發汗以傷其表則外熱轉盛消克以傷其里則痞脹益甚輾轉奘伐計無所施惟有極力攻下而已深可慨也夫內傷一症因勞動太過陽氣亢極而化為火火氣內盛陰氣先虧陽愈盛而陰愈衰乃致清氣不升濁氣不降陰陽交錯穀氣少進胸中之陽既不能內守勢必上逆外擾而為身熱頭痛有似乎傷寒之證而實非外感之邪內經所謂陰虛生內熱陽盛則外熱是也後世惟東垣深得其旨因立補中益氣湯以升舉清陽補益中氣則濁陰不降而降矣此方雖專為內傷脾胃而設然邪乘虛入非兼補則必不解即於此湯稍加表藥熱服取汗最捷兼停宿食者桂枝人參湯若傷寒輕而內傷輕黃耆建中湯至若始為熱中當確遵東垣補中益氣之法未傳寒中則又不能出仲景理中湯之範圍也問仲景形作傷寒其脈不駭緊而弱弱者發渴夫脈弱則無熱邪何故發渴又何以知其為傷寒曰傷寒一科原以症為主脈參之此因勞形作力而感寒發熱故以形作傷寒目之今世所謂勞力感寒者是也夫傷寒之脈法當弦緊今因勞力傷其津氣氣傷不能鼓運其脈所以反弱津耗不能上蒸於咽所以作渴雖非熱邪灼燥使然而津液受傷則一也按切脈之道古人原合望聞問三法而言今之病家不達此理深居幃幄惟以切脈試醫醫者又恥於詳問每多忽略設遇此症此脈得無有誤治之失乎況人所稟之脈與面目性情不殊有偏大偏小純陰純陽反關四出種種異狀皆生成本脈豈可悉歸之於病候耶客云向謂醫道之難莫甚於脈今聞是言則知診法又不在七表八里而在活法推詳几几乎難言之矣余曰醫無難察脈難辨症狀難用方難夫察脈雖難於活法而實無外乎規矩不過原其人之清濁貴賤形志苦樂與脈候之符與不符便可推測病情之逆順譬諸塾師講學得其旨者自然不遠於理用方如儒者作文人於其旨能有幾人合局辨證如釋氏參禪未悟以前舉止障礙既徹以後觸處靈通信手拈來頭頭是道然後方可自信而為人司命也宿食兼傷寒論問傷寒何以見有宿食曰傷寒而見胸前大熱額顱脹胸腹滿按之痛或嘔逆或泄利或腹痛皆是停食之候若右關脈見遲滑為宿食傷胃澀伏為脾陰受傷數盛為食積發熱往往有脈見促結症見足冷乃宿食妨礙經脈流行之道而然不可遂認為代脈陰症大抵傷寒有發熱頭疼雖見脈沉足冷陽道痿縮皆是陽症夾陰合用溫中兼消導之劑宿食一通胃氣敷布又當從陽症例治也若誤認陰症而與四逆則熱勢轉亢真陰立槁多致亡血躁亂而死誤作實治而與承氣則真陰下脫虛陽上逆多致喘脹開泄而死近有一醫治尤德昭霍亂四逆煩渴脈伏誤與溫中藥遂呃逆發斑屢更四醫雜治罔效第七日求救於大人曰六脈洪滑而促呃聲頻並斑色焮赤舌本紫腫證脈俱陽始先所見厥利脈伏皆宿食阻塞於中脾氣遏絕之候腸中之垢雖下胃中之實未除與涼膈散去硝加犀角黃連一服斑退呃止而愈復有少年患夾食傷寒足冷面戴陽醫用發汗藥致動陰血而見四逆嘔泄無度他醫用枳實理中夜半陽回足暖前醫復用消導收功極詆參術為非病家反以為然詎知此症之生全賴溫中之力耳一同道之室傷寒夾食自用疏表消導四五日後邪熱入里而煩渴引飲水道黃赤與五苓散一服遂致水逆不入小便涓滴不通晝夜懊憹不安下問於余令用大劑五苓散隨吐隨灌繼用梔子豉湯灌吐稠痰水飲數升二便隨至是夜即得安臥彼謂自用之藥未嘗有異但力未到不得收效安知其為先前誤用五苓引邪犯本故仍用五苓灌吐領之外泄其先後進退之機難為世俗言也問傷寒夾食何者宜消何者宜下曰大法當先去外邪繼除裡實在胃則宜消在腸則宜下若不分經腑內外並治必致引邪內犯故有表邪未盡不可攻裡之戒然人之所稟不無偏勝宿食亦有寒熱不可一途而取如胃中痰濕素盛必兼理氣豁痰胃虛不能蘊熱必兼溫中消導有寒食伏久而化熱者當兼清食積之火有過用消克傷胃者當溫中養氣以資健運之能若夫下症之緩急豈特三陽明三承氣而已如虛寒壞病非假人參之力則攻之不應寒積固結非籍附子行經則下之不解濕熱脹閉前後不通下症最急非用木香苓半開發痰氣則推之愈逆大約水道不利腸鳴腹滿之症必無燥結大黃必須薑製芒硝斷不可施與夏秋腸澼同法然有一下即安者有下後腸空胃中之實得下而復黏者即製劑之大小亦當師以成法如大承氣以蕩實熱大黃不妨即用兩許雙解散分解內外蘊熱和雜藥不過二三錢必續續而進漸取開結之功枳實梔子豉湯治食復所加大黃不過博棋子大五六枚臨症處方之際苟非講明有素必難合轍也問傷寒停食症治四時有異否曰非但四時症治有異病名傳變各各不同而水土方隅亦是不一如西北土地高厚風寒凜冽患傷寒者非特冬時春夏恆多有之嘗有北人在南感寒二三日尚惡寒不止直待服表藥後方發熱脈浮者若嶺南炎方瀕海冬月不寒陽氣常泄四時多患瘴癘總無傷寒之病在大江以南水土卑弱寒暖不時傷寒與冬溫常間雜而發舉世不察概與辛溫發汗致變風溫而死者多矣亦有邪伏經中至春夏而發為溫病熱病者至於春夏非時暴寒之症與傷寒迥殊冬月寒水司令其邪雖必從太陽而入實由陽維而斜次三陽陰維而斜次三陰蓋邪氣滿溢必注溝渠所以不從十二經而隨八脈也其有宿食者則必並諸陽明以其經上貫額顱是以必脹即腑實熱蒸頭痛亦然若夫春時感冒則司令已屬風木必先少陽受邪少陽在中陽明太陽在外受則三經俱受故治感冒之藥皆不分經絡如芎蘇神術正氣之類為停食感冒之的方春時陽氣方升致汗頗易與蟄藏之令自是不同夏月津本外泄表氣先虛雖或觸冒風露消暑藥中略兼透表即解若恣用風藥不無鼓動痰濕之虞如更加停食必致喘脹逆滿矣大抵停食感寒無論何時何症但氣口脈顯滑盛而手足溫和者皆為易治若脈見短澀而四肢逆冷者必難克效此為總訣素患咳嗽家兼傷寒論問雜病以咳嗽為重傷寒以咳嗽為輕請明其故曰雜病之繁冗難明者莫如咳嗽為最然究其源不過胃氣不清陰火上乘二者而已內經雖分五臟六腑諸咳而所重尤在聚於胃關於肺六字此內因之大綱也外感之咳嗽有風從皮毛而入於肺者有寒從背俞而入於肺者有素患咳嗽復加風寒及形寒飲冷所致者外感乃暴傷經絡之邪一表即清故為輕雜病積久而發且有寒熱虛實新久之不同即善察病機者急難獲效故為重若夫外內合邪邪正交互臟腑糾結之症斷非見病醫病者之所可以克任也問胃氣不清之咳其病在胃客邪所傷在經治當從腑乎從經乎曰胃為臟腑之總司肺為諸咳之門戶不但五臟之久咳乃移於六腑即諸腑之氣靡不本之於胃故凡臟腑諸咳咸聚於胃而關於肺也所謂胃氣不清者言水穀之氣不能如霧之上蒸於肺而轉溉諸臟勢必留積於胃隨熱氣而化為痰隨寒氣而化為飲胃中既為痰飲所滯則輸肺之氣亦必不清而為諸咳之患矣其有六淫外感之邪者又必兼經而治如肺胃素有寒熱痰飲諸嗽皆用上焦陽分之藥則與風寒無礙但虛嗽久嗽之兼風寒者則難於補斂稍費周旋耳外感諸咳中惟風熱風燥二症世所難明如冬時先傷非節之暖復夾風寒外遏而致咳嗽痰結咽腫身痛自汗脈浮者風熱也治此者當辛潤以解其邪如葳蕤湯之類切勿誤與辛熱發汗致變風溫溫毒自利發斑種種危殆至於風燥一症辨治尤難蓋燥為秋氣令不獨行必假風寒之威而令乃振咳乃發也然考之於經則不曰秋傷於燥而言秋傷於濕何也夫秋令本燥以長夏濕土鬱蒸之餘氣漸漬於身中隨秋令收斂而伏於肺衛之間直待秋深燥令大行與濕不能相容至冬而為咳嗽也此症有肺燥胃濕兩難分解之勢古方中惟千金麥門冬湯千金五味子湯二方獨得其秘不知者以為斂散不分燥潤雜出則又置而不用總未達分解之義耳喻嘉言先生不明濕氣內伏燥令外傷之意直云內經獨遺長夏傷於濕句致令秋傷於燥誤為傷濕殊失內經精微之奧矣問陰虛咳逆之人龍火易於炎上若更感風寒而用升散之藥則虛火愈炎為之奈何曰胃氣不清之痰嗽症類繁多若陰虛火炎之乾咳惟有房勞傷精思郁傷脾兩途審系精傷則宜補精神傷則宜養神一定法也有客邪加臨而見表症頻與小劑桂枝湯和其營衛然必倍芍藥以護陰增膠飴以潤燥使中氣有權則陰火不致於上炎以共襄建中之功況芍藥得桂無酸寒收斂之虞桂得芍藥無妄動陰血之患如氣虛畏寒手足寒者則加黃耆血虛煩熱手心熱者則加牡丹皮實陰虛感寒之神丹即咳而小便利若失小便者亦不出是湯也至若夏秋陰虛感冒莫如蔥白香豉湯最宜兼可以救溫病熱病時行疫癘之陰虛者家大人嘗言崇禎辛已歲饑民困江南疫癘大行凡服發表攻裡之藥者皆死惟用敗毒散補中益氣湯多有得生者馮長年孝廉素患陰虛咳嗽而犯時氣遂用蔥白香豉湯加人中黃童便三日而安又一地師宿有血症亦感是氣即用前湯更加犀角丹皮服後大便下血而愈是皆時氣中之變症也近王公峻先生治一孕婦風熱咳嗽已經發散後胎上逼心上氣倚息咳則遺尿用紫蘇飲去芎藭腹皮加葳蕤白薇三劑而胎始寧家昆誕先治一少年陰虛而傷秋燥常時火炎乾咳五心煩熱妄夢失精小水時白時黃秋忽大咳嗽坐間遍地清痰周身凜凜畏寒肌表微微發熱咳甚則嘔嘔則鼻衄如注大便枯燥小水如淋先用異功散去朮加山藥次與六味丸加麥冬五味半月而嗽方止歷推諸驗未有不重在本病者大抵火炎乾咳悉是陰虛古人雖有腎肝同治之論然細格病情多屬腎水枯竭肝藏多火之症所以只宜壯水制陽若導火法斷斷不可輕試也問形寒飲冷所傷與停食感冒何異曰停食感冒是三陽經受病食雖停而未嘗固結胃府未必受傷故但於解表藥中略兼運痰理氣其食自消此形受寒氣胃傷冷食內外並傷乃致移寒於肺而為咳鄰國尚然為壑同氣連枝之脾能無寒中之患乎此一經一腑二臟同時受病非桂枝人參湯枳實理中湯四逆加人參湯等不能圖治豈停食感冒之可與此例哉宿病咽乾閉塞兼傷寒論問人有素患咽中閉塞者復傷於寒則汗下俱禁有平時咽喉乾燥而患傷寒則但禁汗而不禁下何也曰乾燥與閉塞二者輕重懸殊素常咽中閉塞是腎藏精血空虛生陽之氣不能隨經上循喉嚨所以汗之則血隨虛陽上脫而厥冷蜷臥下之則氣隨真陰下脫而下利身疼水漿不下也平昔但乾燥而不閉塞乃胃中津液不充所以不宜發汗設不知此而與汗劑重傷津液不待經傳入腑而為燥結之患矣故善治者一見里症即當微泄以泄其熱若待結定而下則與延寇入室何異哉問虛人不宜發汗者並用建中以和之如胃燥而用膠飴之潤愚所易知若夫腎虛而用建中反實土以勝其水得無愈傷其陰之慮乎曰所謂建中者原在建立中土而堤腎水方中全賴芍藥內護其陰使虛陽無犯上之虞則桂枝等得以建辛發散之功更加膠飴滋中氣之燥而助其作汗豈香燥助脾而有傷犯腎水之慮乎問咽中閉塞之見里症當用何藥咽喉乾燥之見里症當用何藥曰仲景豬膚湯治咽中閉塞之裡症神效外編用童子小便調生白蜜加豬膽汁隔湯熱服面戴陽者去蜜和蔥湯亦佳咽喉乾燥者用蜜煎導熱甚用豬膽汁導臍腹按之痛用小承氣急下以救胃中之津液所以仲景但禁汗而不禁下也問咽痛非有大熱即為大寒寒者何以致痛請明其故曰熱則火氣鬱蒸血液燔灼寒則經絡閉塞陽氣不通皆能致痛甚症雖繁大約不出胃熱陰火寒犯少陰三種如痛而喉舌赤腫痰氣壅塞身熱煩悶前後不通渴欲飲水其脈實大有力或沉伏而滑皆胃中痰濕挾心包之火為患此為實邪或湧或泄或砭皆能取效如咽喉雖赤而不甚焮腫面上時有怫鬱之色而手足不熱二便不秘渴喜熱飲或口中時有清涎上湧此龍火上騰而吸引陰津於上最危之兆若左脈弦數者陰虛水不制火惟宜壯水制陽若六脈數疾無倫或右尺瞥瞥虛大者虛陽遊散於上也又當用引火歸源之法此皆雜病即有壯熱不得以傷寒目之其驟痛無熱而不腫不赤不渴舌淡青紫或嘔泄清水二便清利脈來沉緊者此大寒人犯少陰之經也若二三日而見煩熱躁亂面赤足冷脈變虛大者陰極似陽虛陽發露之候急宜通脈四逆白通加豬膽汁湯溫之遲則不救頭風兼傷寒論問有患傷寒者屢用發散汗出身涼而頭痛愈劇徹夜叫號至夜則有微熱此係何故曰此必素有頭風或血虛風熱而過汗重傷血液所以其痛益甚也問治此者仍當祛風乎清火乎抑宜養血乎曰風火相煽額與眉稜目珠但痛當用選奇湯兼清風熱久郁成頭風者清空膏茶調散之類大寒犯腦痛連齒頰鬱閉成火者非兼調寒熱則火不散如本事玉真丸寶鑑石膏散隨表裡而開發之痛冬不除須防目翳之患肥人濕土盛者半夏白朮天麻湯瓜蒂散清理濕熱為要若兩太陽痛連目梢者為血虛雖宜養血為主然有火則兼清火有邪則兼散邪如四物湯加細辛蒼耳芽茶當歸補血湯加蔥豉薑棗皆前人已驗之良法問一婦素稟羸弱產育過多常患頭痛背上畏寒之極夏月必用綿絮裹首覆衣掩背初冬傷寒發熱頭痛異常周身痛楚膝下與手臂皆不溫而手心獨熱胸膈無恙二便如常或用表藥熱勢不減畏寒轉增胸膈迷悶二便艱澀李懷茲先生用補中益氣加蔓荊子微汗而安愚謂此婦雖虛然既犯傷寒法當解表何乃汗之不愈補之即安幸明示以開茅塞曰此婦素常陽氣不升而頭疼背寒復與發散傷其衛氣所以熱不除而轉加畏寒也用補中益氣以升舉清陽衛得參耆之力自能祛邪外散非深得東垣之旨者不能也問一老婦久患偏頭風諸治不效春間復感風寒方士用火針刺風池合谷等穴針處皆發赤腫氣從小腹上衝不時頭面赤熱諸醫莫解其故因延瘍醫治之用消毒藥腫愈堅大施元倩先生用桂枝湯數劑而平細釋此症似屬邪熱而用辛溫之藥反效何也曰此即燒針令其汗針處被寒核起而赤之成法幸有施子能用知仲景之學尚不至於全廢也問今有一少年形體肥盛患傷寒昏熱或用表藥不得汗遂譫妄躁亂愚用涼膈散加黃連而熱除但頭痛經月不止晝則目珠與眉陵太陽俱痠疼夜則大痛引急如掣目中如有風吹狀以熱掌按之即稍覺爽快寐則頭與胸前大汗如漉左脈緊細右脈浮緩服茶調散用搐鼻法不應與養血藥亦不應不識此為何病何藥可以收功曰此熱邪雖從內泄而寒痰襲於經中因體肥不能外泄所以流連不解內經所謂其人肥則為目風眼寒是也治當解營分鬱閉之火除經絡沉沍之寒授以三因芎辛湯加生石膏半兩數日必能獲效服之果然心腹諸痛兼傷寒論問凡宿有心腹諸痛因外感之邪觸動而發若欲先治表症里痛勢難刻緩若欲兼治其痛又恐有礙於表歷考方論中素無成法可師幸顯示至理以補昔賢之未逮曰諸痛皆有表裡氣血虛實寒熱之分其痛在肌表者中間不無里症如胃脘留飲之臂痛腎虛足不任地之腳心痛腎衰風襲之下體痿弱骨節疼痛豈非痛出外而病根於裡者乎然病雖從內而發其實痛在經絡所以治表之藥總無妨於本病但不可不顧慮血氣以虛其虛痛必轉劇也其胸脅肩背諸痛症雖不一以大綱論之悉為陽分之疾縱有傷寒表症而痛楚不堪者不妨兼治其痛並無引邪入犯三陰之虞即使陰邪上逆不過先溫其里若腎心痛之與背相控如從後觸其心者仍無礙於里症也觀仲景太陽例中傷寒醫下之續得下利清穀不止身疼痛急當救里後身疼痛清便自調者急當救表內有虛寒者必當先溫其里而後解表乃正治也至於腰臍少腹諸痛雖皆陰分之患然既有表症則當從表治之如腰痛而兼外感亦須桂枝湯以分解太陽之邪則裡氣亦得疏通而痛必少緩寒者則加附子以溫之腹痛用小建中為土中伐木之聖藥血虛而氣散者尤宜有寒則加乾薑寒甚則加附子虛寒則用桂枝人參湯寒極而嘔金匱大建中湯少腹痛用當歸四逆湯寒加吳茱萸最妙此皆兼理外內之良法也大抵有宿病之人不得用峻汗峻攻之法必參其人之形氣盛衰客邪微甚本病之新久虛實向來之宜寒宜熱宜補宜瀉宜燥宜潤宜降宜升或近日服過何藥之相安不相安其間或挾痰或挾血或挾火或挾氣或挾水或挾積務在審症詳明投劑果決自然隨手克應矣故凡智者用方法法不離古人而實未嘗執古人之成法也問一少年素有便血自言觸穢腹痛經日不止因覓土醫刺委中出血如注是夜即大發寒熱頭痛如搗腹脅滿痛不能轉側譫語如見鬼狀一館師以大柴胡下之而愈愈後不時寒熱咳嗽服滋陰清肺之藥兩月餘其嗽愈甚近日飲食少進大便作瀉而兼下血左右關尺皆弦細而數未識此症尚可圖治否曰此必刺委中時感冒風寒因其人素有便血邪乘虛入而為熱入血室如陽明病下血譫語之例非獨婦人經水適來適斷而有是症也用大柴胡得愈者是偶中痛隨利減之效原非正治所以愈後不時寒熱咳嗽脾肺清陽下陷而肺失通調輸化之氣也斯時不與調補脾胃反與寒涼清肺則脾氣愈傷不能統血而為下脫泄瀉之患虛損已成雖暫時復生恐難為力矣蓋腹痛一症舉世咸謂沙脹或刮或刺或飲冷水種種為害非淺曾見有陰虛停食腹痛誤飲冷水吐利不止周身青黑而斃者有經水將行作痛亦飲冷水經閉不通而成蠱脹者與夫痛痹一症靈樞謂之賊風後世方書名為痛風亦曰白虎歷節風近來呼為箭風例禁湯液恣用針艾火淬愚夫無知被其煽惑而受非刑固不足訝即明哲之士亦常以箭風二字鑿鑿而談且有自任時醫者身有所痛必請村中叟嫗挑淬咒水吞符無所不至吾將以靈素痹論金匱胸痹血痹諸例請用從火庶不致與俗全違耳亡血家兼傷寒論問仲景太陽篇中有亡血家不可發汗發汗則寒慄而振有衄家不可發汗汗出則額上陷脈急緊直視不能瞬不得眠夫亡血是統諸失血而言何衄家另設一例且血為陰血亡則陰傷陰傷則陽盛何故汗之反寒慄而振衄家何獨不然又為額上陷脈急緊等症曰血之與氣異名同類血雖屬陰實為陽氣之根與氣相為維附一息不能相離凡人身中有氣不到處則血凝不流而為刺痛痛處必熱有血不行處則水飲襲入而為腫痛痛止必寒素有血症之人復發汗以奪其血寒慄而振勢所不免血既消亡於內則陽氣無根所以諸亡血家驟脫不止必用大劑人參斂其神氣氣斂則血有所統無復再脫之虞斯時雖不敢望其陽生陰長但得扶定胃氣以進飲食即是生長之基設不知此而用血藥惟有膩膈傷中而為奪食泄瀉之患也至於衄血一症皆由陽明經火氣逆行而至故曰衄行清道不知者以清道指肺遂有衄血出於肺之說大可噴飯詳衄血一症十二經惟手足陽明太陽四經有之即使因肺致衄亦必由手陽明經而至肺雖清肅之藏業常少血且經脈不行於鼻孔其血從何而至哉蓋陽明多氣多血是以患其症者恬不知怪然慣衄之人稍有勞動或煩心過飲受熱感寒血必隨火而行熟徑蓋火即氣氣隨血散久之經氣並傷更加奪汗則血不榮筋而為兩額之動脈收引瞀急不能卒視也其所以不得眠者虛火蘊降於胃胃不和則臥不安此皆亡血人復發其汗之候若因傷寒而致亡血又當隨症施治如太陽症失汗邪留經中而衄非麻黃湯汗之不解有熱傳營分而為吐血則當清解其內如犀角地黃湯黃連阿膠湯之類凡此種種未遑盡述姑就宿病傷血之人傷寒表症而言如衄血則宜小建中加犀角丹皮咯血則宜小建中加丹皮童便吐血則宜黃耆建中加童便阿膠伏氣發溫而為吐衄皆從內而至經絡胃府通宜涼膈解毒三黃石膏加蔥豉童便之屬若感冒風熱之衄則宜蔥白香湯加童便若素有便血而兼傷寒則宜千金內補當歸建中寒加灶土炮姜熱用白頭翁湯婦人宿患血崩而感客邪則宜金匱三物旋覆花湯加香豉或當歸建中加黃耆防風蔥豉最妙至若熱邪傳裡而觸動陰血無論宿病新病皆無表症糾纏但須詳從何道而至或稠或清或鮮或晦自可直清本病竟行無礙矣問亡血家衄家症見於外尚有發汗之誤其血蓄於內而顯發熱頭痛者得無誤汗之患乎曰凡蓄血必有見症可察而知其所患處有三蓄於胃脘之內則胸膈隱隱刺痛甚則牽引於背蓄於厥陰之經則脅下痛引腰脊蓄於膀胱之府則少腹急痛若小便不利者並傷氣分也其辨治之法須詳新久虛實寒熱大率新者多實實則宜攻久蓄必虛虛當兼補寒則非暖不散最忌酸寒熱則宜於寒下然必加辛溫而為嚮導亦有症顯虛熱而所蓄屬寒者必畏寒而畏熱飲不可因其假症而誤與寒涼攻血多致發呃脫瀉而死其治蓄血之兼傷寒表症輕則小建中香蘇散之類重則五積散隨上下寒熱而為裁酌至見半表及傳入里皆與本病無礙但久蓄虛人不可輕動其血此為切禁問鄒孔昭之弟費仲雪之女皆患失血何以知其必死而辭之曰孔昭昆仲俱患喘咳吐血肩息不得臥孔昭之脈尺部雖弦而寸關卻浮症雖陰火迫肺脈則兼感客邪且審其所吐之血多滯涎水知必從胃而出故先與小建中加丹皮和其營衛續於異功去朮加薯芋丹皮下靈砂丹收攝陰火則肺胃自清於昭之脈關尺皆弦細如循刀刃血色正赤如凝朱為少陰守藏之血故知必死費仲雪先生久患膈塞嘔逆中脘攪痛如刺或時痰中帶血六脈沉細如絲自謂六陰之脈及按至神門別有一脈上至陽谿迢迢應指知胃氣未竭尚可苟延其令愛不過咳血一二次尚有梳洗出診脈得純弦細數此胃氣已竭安有復生之理問郭孝聞之室血崩聞用金鈴子而愈何也曰孝聞夫人暑月經行時涼臥風中先患淋瀝加以惱怒跌哭遂崩脫不止小腹中如線一條貫心掣痛常發熱頭疼遍體煩疼服止血諸藥不應而進參耆忽然昏憒不省崩脫愈甚深夜急遽邀往脈得弦大而芤獨左寸丸滑知衝任二脈受病明是風入胞門所致久之風從火化血愈傷而火愈熾非旋覆花湯金鈴子散兼進不能清其風熱降其逆氣也況此症多有火淫血室濕結子戶及鬱結傷脾怒動肝火驚恐失跌種種不同若用通套升發補斂之藥烏能獲效哉問兵道李石臺內侄之傷寒更七醫而轉篤皆不識為何症尊大人何以知其為血而下之曰魯公乘於夏月從陸來吳途中中暍受傷有之大暑中何有傷寒之症醫見壯熱昏憒便與發汗發汗不已兼之消導消導不已繼進參術主見雜出補瀉遍嘗正氣轉傷蓄積愈固而見善忘如狂身汗如油直視不眠唇反不收齒齦腐穢七晝夜喃喃不休手足動掉不寧脈得純弦而豁大中芤明是蓄血而兼狐惑之症急與犀角地黃湯加黃連烏梅清其胃安其蟲腹中之黑物自下而神識頓清從未嘗用攻血之藥也多汗家兼傷寒論問汗家不宜發汗則邪從何解曰所謂汗家不當發汗是指平昔腠理不固不時傷風自汗者而言即仲景例中汗家重發汗必恍惚心亂小便已陰疼一條不過言衛虛營氣常泄之人汗之復傷其營乃有如是變症非謂多汗之人一概不可發汗也嘗見陰虛盜汗者發汗不得汗則乾熱不已汗出則足冷麵戴陽陽虛自汗者發汗則惡寒不食甚至冷汗厥逆蓋陰虛則血熱其汗亦熱陽虛則氣寒其汗常冷且有胃氣虛寒者常出淡汗凡此皆以發汗為禁惟小建中為主陰虛加丹皮陽虛加黃耆陰陽俱虛二味並加胃虛自汗不止則加人參又有血虛心痛則加當歸血虛寢汗熱不止則合當歸補血湯皆萬舉萬當百不失一者若夫濕熱素盛之人舉動則渾身汗出設有客邪表症亦謂其虛而禁發汗則表邪與內濕固結難分當乘邪未入里時急與表散但表法與尋常不同必兼辛涼淡泄之味則胃熱方化非但無痰逆氣滿之虞並可以杜風熱內入之患如越婢加半夏湯小青龍加石膏湯麻杏甘石湯麻黃連軺赤小豆湯之類若治稍失時邪一入內即當隨症用瀉心湯諸法復有濕熱多汗之人而兼陰虛者汗之則喘汗胸滿上熱下寒而上脫下之則溺閉腹脹五液注下而下脫兼陽虛者汗之則額上與手背冷汗不止而上脫下之則呃逆嘔穢暴下不止而下脫所以犯此皆死余嘗用小陷胸合豬苓湯治陰虛濕熱小陷胸合理中湯治陽虛濕熱每多見效倘陰虛下利不止用赤石脂禹餘糧湯陽虛下利不止用桃花湯間用得生者此皆平時多汗復感客邪之候若因外感而見自汗者則與上法無預也積聚動氣兼傷寒論問積聚動氣三者皆腹中固疾其受病之原有異否曰積聚寒氣客於五臟之膜血氣不行所生聚則汁沫取勝於六腑之廓溢蓄不瀉而成動氣為無形之氣受病所以忽有忽無與積聚之有形質者不同問有動氣之人不可汗下其有積聚者亦有所禁乎曰動氣是脾衰氣失統運之候汗下先動脾津故為切禁非若積聚初起之可用攻擊者若久病氣衰亦必兼補而攻始應嘗見有積聚誤汗則津液外泄固結隨表藥而上升者誤攻則氣隨下脫陰邪無制而愈逆者亦有下之便利不止水道澀痛如淋者內經所謂此風根也不可動動之為水溺澀之病是也問已誤汗下者為之奈何曰誤汗虛陽擾亂而氣上衝或咳吐眩惕或心煩惡寒者通宜五苓散去朮多加棗仁降斂之誤下虛陽不禁而氣下奪或身熱蜷臥或下利汗出者金匱大建中湯吳茱萸湯附子理中加桂苓湯急溫其里則虛熱不治自息矣問三證之表法曰積之兼表者以溫血為主如甘草乾薑湯加桂枝薑棗感冒則香蘇散蔥白香豉湯聚之兼表者以滌飲為先如小半夏茯苓湯加桂枝薑棗或四七湯芎蘇散之類動氣之兼表者以安中為務如小建中黃耆建中為最當非若積之芍藥助陰有礙聚之膠飴助濕難投也若營傷無汗者則合香蘇飲凡表藥皆升而香蘇獨降也問三證之和法曰和法總不出小柴胡然於本方中宜除去參芩積加細辛乾薑聚加茯苓橘皮動氣但去黃芩加木香桂心之類又須知中虛挾邪之人胸多寒熱不和常有痞滿之患當於三瀉心湯黃連湯旋覆代赭石湯選用若等脹滿喘急而治難為力矣問三者治失其宜而見里症當何法以除之曰大約中氣久虛及有宿病之人先用導法如積用蜜煎加川烏末導聚用豬膽汁加薑汁導動氣用醬姜導若裡熱勢劇不下必死者積用大黃附子湯聚用厚朴七物湯動氣理中湯去朮加桂苓薑製大黃微利之庶免陰氣逆上之虞至於伏氣發溫雖有積氣當涼膈散大柴胡及三黃石膏加大黃急下之以熱毒從內而發里先受邪所以不禁內奪非導法所能盪滌其熱也疝證兼傷寒論問七疝之名各有不同且所治諸藥多寒熱錯雜此屬何意曰疝瘕之症因內經有任脈為病男子內結七疝句致元方子和各立七疝之名咸非內經所謂內經以邪留諸經腹中引急諸痛通名曰疝近世惟以睪丸之病為疝外此皆置而不論也詳經中雖有贓腑諸疝統而言之不離任與厥陰蓋肝則任之生化任之陰氣為疝肝之陽氣為風故治疝多用風藥觀金匱大烏頭煎烏頭桂枝湯並不用附而用烏義可見矣夫疝之受病多由寒熱不和所以經脈緩急即使濕熱必因寒束而痛伏寒必由火鬱而發但須詳偏寒則從寒偏熱則從熱如烏頭梔子湯治本寒標熱少腹中緩急痛引心脅之疝蒼朮五苓加枳實檗皮湯治頹癃脹墜之疝皆寒為熱引熱為寒導之法然其症各有所挾必非空氣作痛故有血則兼攻血有積則兼攻積能識此義方可與言治疝諸法問疝症多兼風治表症自可無虞不識里症有所禁否曰在無客邪時治其本病多兼風藥若一有風寒則表藥反難恣用常見有疝瘕人服羌防柴葛之類升動陰邪每致喘脹嘔呃善治者必兼桂苓枳實等味於香蘇芎蘇小建中蔥白香豉諸方中則陳氣不至於上逆若有陳寒必加烏附細辛薑桂之屬裡氣不溫外邪必不得散倘見里症切禁苦寒峻攻與積聚等法無異淋濁兼傷寒論問諸淋皆腎虛膀胱受熱何古方中多有用熱藥者曰淋之為病小便如粟狀方書分膏石氣血勞五種丹溪謂諸淋皆忌補氣氣得補而愈脹血得補而愈澀熱得補而愈甚惟勞淋則宜補氣但須兼利州都則水道之熱方化然多有腎虛囊中受寒者症必先寒凜而後溲便血淋亦有屬寒者其色必瘀晦無光不鮮不紫是皆膀胱虛寒陽不化陰之候觀金匱治小便不利有水氣而渴用栝蔞瞿麥丸消渴之飲一斗溲一斗溲上如脂用腎氣丸一屬腎氣不開一屬腎氣不合並用附子以司開合之權豈可概謂膀胱受熱乎問濁帶之症丹溪謂胃中濁痰滲入膀胱而所下常有赤色者何曰肥人固多濁帶而瘦人亦恆患此且多有陰中不潔敗濁襲入精竅者辨治之法大約以干掩竅端者為火不幹掩者為濕小水赤澀而痛或濁有赤色者為小腸濕熱小水不赤不痛而所下色白或滲利轉甚者為脾氣下陷莖中痛癢而發寒熱或有結痛者為毒邪所侵若此種種詎止痰濕一端而已問淋濁皆前陰之疾設有是症而更傷於寒其治亦相類否曰淋為精病濁為氣病安得相類精病則宜黃耆建中熱加丹皮寒加附子下消走精二味並加精滑不止或夢中走泄桂枝加龍骨牡蠣湯氣病則宜香蘇散濕加苓半木香熱加蔥豉滑石虛加升柴參耆水氣上逆而渴五淋散灌吐取汗最捷此皆治淋濁兼外感之良法復有兼雜他症者如苕溪田孟先久患膏淋溲中有塊如橘核狀外裹血膜中包黃水乃醉後入房酒濕流入腎藏所致遍服利水固精藥不應溽暑中忽然憎寒發熱喘促悶亂腰背煩疼脈見浮濡沉細是淋久陰傷暑氣襲虛之症先與生料六味加川萆薢作湯下消暑丸次用前湯送本事豬苓丸八服諸症霍然江右孝廉蔡允恭嚴冬患濁小腹結硬大發寒熱巔痛自汗脈得左緩右澀兩尺緊細乃風挾毒邪入厥陰之經與當歸四逆湯熱服覆汗而熱除即以前方除去通草薑棗加蠍梢陵鯉甲麝臍丸服不令作汗數日塊消痛止但濁猶未淨或令嚼生銀杏而痊世人咸謂銀杏澀精殊不知其專滌敗濁也瀉痢兼傷寒論問泄瀉皆脾胃之疾何內經有風寒濕熱之泄且治瀉多有兼用風藥者曰六氣中除燥氣外皆能為瀉其邪咸從經絡入犯中土所以治瀉多用風藥即內因之瀉亦常兼用如脾虛氣陷作瀉用補中益氣必加羌防以勝濕乃正治也其五更腎瀉昔人皆謂腎虛而用四神五味補斂之藥服之未必悉應殊不知此皆酒濕入傷水藏所致余嘗用金匱澤瀉湯加薑辛五味萆薢之屬往往獲效又有脾腎俱虛之瀉若小便清利倍常則泄瀉大作此降泄多而升氣少切不可用苓澤之類且關門失守腎氣空虛亦不得用升柴等藥惟宜附子理中加紫石英赤石脂紅豆以固斂之如素有酒積食積痰濕水飲或積兼氣滯頓瀉而兼感外邪者並宜香蘇散為主酒積合澤瀉湯食積合平胃散痰濕合二陳湯水飲合五苓散氣滯合四七湯瀉症繁多聊舉一二為例余可類推矣問滯下以通利為務若兼感風寒而與通利能無妨於表症乎曰痢疾多患於夏秋本無傷寒之理然初秋常有非時暴寒或久痢延至冬時及休息痢多有兼外感者既有表症自應救表但須審本病之新久虛實或氣分受傷或血分受傷或氣血並傷參酌而治可也夫痢之通利不過乘初起濕熱全盛時乃為相宜然在元氣虛人傷犯胃氣多有呃噦不食下利不止而危者當知積滯原系腸中津液因氣不統運而為敗垢惟當宣通其氣則失統之敗垢自下未傷之津液自安後重窘迫自除矣近世但守痛隨利減一語既以通利瀉氣之劑施之久痢虛痢吾未見有得愈者況兼客邪為治乎方書中原有胃風湯治風毒下痢參蘇飲治下痢發熱白頭翁湯治熱痢下重敗毒散治疫痢壯熱陽旦湯治血痢身熱脈浮陽旦湯治血痢瘀晦腹痛當歸四逆湯治下痢身熱手足冷五苓散治下痢有熱水道閉升麻葛根加犀角湯治下痢身熱發斑調中飲治下痢胸前手足陰斑三奇湯治久痢後重不除補中益氣湯治久痢元氣虛陷及瘧後病後一切虛痢皆先哲之成則未嘗不用傷寒之法也然非博聞廣識之士難以語此問一人陰虛發熱下痢赤白至夜煩渴不寧或用涼血攻積藥而死一人陰虛發熱下痢五色胸中常覺飢狀得食則脹或用補中益氣而死一人陰虛發熱下痢不食郭友三先生用豬苓湯黃連阿膠湯而痊二方度非下痢門中藥而用之輒應何也曰世患陰虛下痢者頗多古人從未闡發其症未有不發熱不煩渴不畏食不見紅不夜甚者蓋陰氣內亡勢必虛陽外擾故治陰虛之痢涼血死攻積死補氣亦死惟兼清解熱毒兼滋陰血庶可保全此用仲景少陰例中救熱存陰之法與金匱治產後下痢虛極用白頭翁加甘草阿膠湯不殊也胎產兼傷寒論問孕婦百病以胎產為主若有外感客邪黃芩白朮仍宜用否曰古人用黃芩安胎是因子氣過熱不寧故用苦寒以安之脾為一身之津梁主內外諸氣而胎息運化之機全賴脾土故用白朮以助之然惟形瘦血熱營行過疾而胎常上逼過動不安者乃為相宜若形盛氣衰胎常下墜者非人參舉之不安形盛氣實胎常不運者非香砂耗之不安血虛火旺腹常急痛者非歸芎養之不安體肥痰盛嘔逆眩暈者非苓半豁之不安此皆治母氣之偏勝也又有父氣虛羸或有宿病而胎稟不固者則當如父調理自安若因風寒所傷而胎不安者則桂枝湯香蘇散蔥白香豉湯諒所宜而用之和解則小柴胡柴胡四物里症則大柴胡小承氣涼膈散隨上下輕重而施伏邪時氣尤宜急下此即安胎之要訣內經所謂有故無隕是也下藥中獨芒硝切不可犯凡胎死腹中及誤斷臍腸胞衣上升壯實人並用平胃散加芒硝虛人理中湯因外感傷胎者五積散加芒硝服之胞胎即縮小而下走血之性可知其半夏大黃雖言孕婦忌服然用之得宜亦安胎聖藥若有客邪而用芩術使熱邪留連不解反足傷胎觀紫蘇飲治孕婦風寒惱怒喘脹腹痛諸疾即於本方除去川芎生薑而加白朮為達生散瘦胎飲則以芩術為君而加枳殼滑石豈二味專主安胎又能滑胎耶蓋瘦胎飲一方特為奉養太過胎肥不能轉運而設今人不達此理無故服之傷耗其氣臨產無力送胎反致難產及釀成產後諸患者不少良由不明虛實補瀉故爾問產後以行血為務若有表邪而與行血得無引邪傷營之患乎曰產後諸疾非行血則邪不去即諸虛症亦須血行其氣乃復芎行之有方不可過峻凡產後危症莫如三沖三急三沖者敗血之沖肺衝心沖胃也三急者新產之嘔吐泄瀉多汗也其用藥則有三禁禁佛手散以川芎能發汗也禁四物湯以地黃能作瀉也禁小柴胡以黃芩能阻惡露也然皆產後之常法設有風寒危急亦將守此坐令致斃乎嘗讀金匱產後之例有大承氣湯下瘀血湯陽旦湯三物黃芩湯等方不能使人無訝及見家嚴所治金聖祥婦產後敗血沖肺發熱面赤喘脹人事不省用二味參蘇飲倍蘇木加芒硝惡露即通而蘇宋孝先次孫媳產後發熱頭疼腹中急痛死絕浮蘇者再與當歸內補建中湯得汗而痊其長孫媳臨產下痢產後膿血無度更兼感冒客邪而發熱頭痛此血液大脫胃氣逮盡非但難勝藥力即益母湯亦傷胃難用惟借金匱黃土湯之法令以伏龍肝炒黑楂肉炒焦砂糖炒焦陳米入薑棗煎成不時熱服取枯以去垢而有溫中止痢之功薑棗以和營散邪三日熱退痢減思進糜飲七日而痢全瘳矣鄭墨林夫人變臨產下痢用連理湯加木香二服而止止後即產產後嘔吐大汗以抵聖散去赤芍加炮薑黃連而康徐日升婦草蓐中發露得風壯熱頭痛面赤胸煩用香蘇散加荊芥蔥豉而熱除但手足心熱不時煩擾善食易飢二便不利與三物黃芩湯而安以上等治未嘗不用汗下不用寒涼而暴病勢緊不得不猛治者下手稍軟去生便遠其病久氣衰者非但不可峻攻峻補亦是不可必緩劑輕調以候胃氣之復務在臨症權宜若拘世俗之見而禁汗下專事血藥以治胎產之疾我未敢信以為然經脈經脈出自靈樞本當全篇融貫熟讀為醫門之實學第苦覙縷交加難於誦記於是稍為裁削略其繁詞兼取軒岐仲景切於經脈之文參入一二以為決診之捷法若言筆削聖經則我何敢肺手太陰之脈起於中焦下絡大腸還循胃口是上膈膈膜遮膈濁氣使不上熏心肺布胸中屬肺從肺系橫出腋下循臑內下肘中循臂內入寸口循魚際出大指其支者於腕後直出次指內廉出其端是動邪在氣氣為是動則病肺脹滿膨膨然而喘咳其脈布胸中故病喘咳肺宜溫潤燥則病寒亦病胸中痛缺盆中痛缺盆乃手足陽明脈氣所發肺病則胃氣不升故氣不行而痛甚則交兩手而瞀瞀麻木不仁也是主肺所生病者邪在血血為所生病咳上氣喘渴煩心胸滿臑臂內前廉痛氣盛有餘則喘渴胸盈仰息肩背痛風寒汗出中風小便數而欠風寒在表故汗出中風邪傷其氣故小便數而欠欠少也氣虛則肩背痛寒少氣不足以息溺色變氣虛則陽病故為痛為寒而怯然少氣金衰則水涸故膀胱氣化不行而溺色黃赤也氣絕則皮毛焦爪枯毛折盛者寸口大三倍於人迎虛者寸口反小於人迎也大腸手陽明之脈起於大指次指之端肺脈出次指大腸脈即受肺交而起食指出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃音余骨之前廉上出柱骨之會上下入於缺盆絡肺下膈屬大腸大腸上接小腸下接回腸傳送不潔之物必待肺氣下行故與肺為表裡其支者從缺盆上頸貫頰入下齒挾口交人中左之右右之左上挾鼻孔是動則病齒痛必惡熱飲頰腫是主津所生病者大腸與肺為表裡肺主氣津由氣化故凡大腸之或泄或閉皆津所生之病也目黃口乾鼻衄喉痹能言腹中雷鳴切痛感寒則泄氣常沖胸瘧日發而渴肩前臑痛次指不用氣有餘則當脈所過者熱腫皮膚谷谷然堅腫而不痛虛則寒慄不復肩背肘臂外痛盛者人迎大三倍於寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中入上齒挾口環唇出人迎穴名在面絡於目陽明主肉其脈挾鼻絡於目上耳前循髮際至額顱其支者下人迎穴名在額動脈應手循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳挾臍入氣街中氣衝穴也其支者起胃口循腹裡下氣街中而合以下髀間抵伏兔伏兔在膝上六寸髀關在伏兔後下膝臏中循脛外廉下足胕入中指內間其支者下膝入次指外間按足陽明厲兌內庭陷谷皆在次指靈樞甲乙脈經俱作中指誤其支者別跗上入大指間出其端是動則病瀝瀝振寒善伸數欠顏黑伸欠顏黑土勝水也惡人與火胃實則熱熱則惡火聞木音則惕然而驚土惡木邪故驚也心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走陽盛則四肢實實則能登高也賁響腹脹火盛與水相激搏有聲即腸鳴也本輸篇云大腸小腸皆屬於胃罵詈不避親疏土熱蒸於心胸神明則亂也是主血所生病者陽明多氣多血是主血所生病狂瘧間日發而不渴濕淫濕濁下滲也陰痿足廢沖督帶三脈皆聚陽明陽明主潤宗筋宗筋主束骨而利機關也汗出鼻衄唇蹩暴難言甚則不能言面腫齒痛必惡清飲口喎唇胗人中腫也面赤熱頸腫喉痹不能言大腹水脹土病不能制水也膝臏腫痛膺乳氣街股骭外廉足跗上皆痛次指不用浮蹩脹胃脘當臍而痛上支兩脅膈塞不通飲食不下胃中不和則不能正偃腹中鳴身重難以行胃熱則宗氣喘數胃之大絡名虛里出左乳下其動應衣宗氣也氣盛則身以前皆熱消穀善飢溺色黃此陽明實熱在經在腑之辨也氣不足則身以前皆寒慄胃中寒則脹滿此陽明虛寒在經在腑之辨也盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端上內踝音哇循股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔脾氣暖則健故食易消寒則衰故食不化而嘔逆胃脘痛腹脹善噫脾脈入腹屬脾絡胃故為痛為脹陰盛而上走陽明故氣滯而為噫得後與氣則怏然如衰病後矢氣則怏然如病衰但倦怠耳身體皆重脾濕之氣下流也是主脾所生病者舌本強氣病則強血病則痛煩心心下急痛寒瘧溏瘕泄脾寒則為溏泄脾滯則為癥瘕水閉黃癉不能臥水氣逆滿傷氣也善飢善味肉痿足不收行善瘛強立股膝內腫厥大指不用寒甚則厥而響響然腹中谷谷便溲難心痛引背不得息實則腹脹涇溲不利身盡痛虛則四肢不用五臟不安百節皆縱腹大腸鳴飧泄面黃不嗜食食不化嗜臥九竅不通身體不能動搖當臍上下左右動氣氣絕則脈不營肌肉舌萎人中滿唇反盛者寸口大三倍於人迎虛者寸口反小於人迎也心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系上肺出腋下下肘內循臂內後廉入掌內循小指之內出其端心系有二一則上與肺通為心包絡之系一則下絡小腸為周身血脈之總司是動則病嗌乾心痛渴而欲飲心火炎則心液耗故濁而欲飲善笑善忘眩僕煩心善驚不寐是主心所生病者目黃膺背肩脅滿痛膕臂內後廉痛厥掌中熱而啘浸淫瘡瘍舌乾焦苦消渴舌破心胸間汗實則笑不休虛則悲胸腹大脅下與腰相引而痛氣絕則脈不通血不流髦色不澤面黑如漆柴盛者寸口大再倍於人迎虛者寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕循臂骨下廉出肘內側兩筋間上循膕外後廉交肩上入缺盆上衝心貫肝肺絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼音抽抵鼻至目內眥是動則病嗌痛頷腫不可以顧痛在頸側也肩似拔膕似折是主液所生病者小腸主泌別清濁宿則清濁不分而流衍無制是主液所生病也耳聾目黃頰腫鼻衄不成流頸頷肩膕肘臂外後廉皆痛虛則小腹控睪音高引腰脊上衝心而痛盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱足太陽之脈起於目內眥睛明穴也上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩臑內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下貫臀取膕中其支者從髆內左右別下貫脾挾脊內過髀樞下合膕中以下貫端內踹音湍足跟也至小指外側是動則病沖頭痛邪循經上而痛也目似脫項似拔痛在項後不可伏仰脊痛腰似折痛上寒髀不可以曲膕如結踹如裂是主骨所生病者腎主骨膀胱為腎之府故亦主之世本作是主筋所生病者誤痔瘧虛則痔盛則瘧狂癲疾邪入於陽也頭囟音信項痛目黃為蓄血淚出鼻衄則成流小腹遍腫而痛以手按之即欲小便而不得胞痹少腹按之內痛若沃以湯澀於小便上為清涕膀胱不利為癃不約為遺溺也項背腰尻膕踹腳皆痛小指不用盛者人迎大再倍於寸口虛者人迎反小於寸口也腎足少陰之脈起於小指之下斜走足心循內踝後別入跟中出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從橫骨中挾臍循腹上行而入肺橫骨一名下極從肺出絡心注胸中腎藏有二其脈交通水火左者直上入肺而循喉挾舌右者直行臍腹而上絡心胞越人以右腎為命門非也是動則病飢不欲食陰火上乘雖飢不欲食也面如漆柴腎水枯也咳唾則有血真陰損而延及其母也喝喝而喘腎水不能上通於肺也口乾咯血坐而欲起陰虛陽擾而不能靜也目𥉂𥉂如無所見目之明在瞳子瞳子者骨之精腎氣內奪故目𥉂𥉂如無所見也心如懸若飢狀心腎不交則精神離散故心如懸陰虛則內餒故常若飢狀氣不足則善恐心惕惕如人將捕之腎主志為恐腎氣怯故惕惕如人將捕之是主腎所生病者耳鳴遺泄口熱舌乾咽腫上氣咽乾及痛厥氣走而不能言手足清大便自利口熱如膠煩心心痛痛引腰脊而欲嘔黃癉水虛土實故為癉其額上必黑腸澼腎開竅於二陰故為腸澼寒則利清穀熱則便膿血脊股內後廉痛痿厥嗜臥泄利下重足下熱而痛小腹急痛腰下冷痛自言腹脹滿而實不滿脛腫煩冤煩為煩擾冤為冤熱骨痿不能起䏚中清䏚音抄季肋下也指清黑清厥意不樂四肢不收身重寢汗出憎風氣絕則肉軟怯齒長而垢發無澤盛者寸口大再倍於人迎虛者寸口反小於人迎也心主手厥陰心包絡之脈起於胸中出屬心包絡諸邪之在心者皆心包絡受之下膈歷絡三焦其支者循胸出脅下腋循膕內入肘中下臂行兩筋間入掌中循中指其支者別掌中循小指次指出其端無名指也是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中澹澹大動面赤目黃喜笑不休是主脈所生病者諸脈雖屬於心而行太陰肺部脈之運動皆由包絡之火故又為陰包所主煩心心痛痛引腋脅而欲咳掌中熱脈起心胸入掌中也盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出兩指之間循手表脘出臂外兩骨間上貫肘循臑外上肩入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後出耳上角以屈下頰至䪼其支者從耳後入耳中出耳前交頰至目銳眥三焦有上中下之名其形則一在七節兩腎之中所謂上焦如霧中焦如漚下焦如瀆者是形容三焦之用非實有三處也是動則病耳聾渾渾沌沌而痛咽腫喉痹三焦之氣通於喉喉不和則痹腫矣往來寒熱是主氣所生病者三焦為決瀆之官水病必由於氣也汗出目銳眥痛頰痛耳鳴耳後肩臑肘臂外皆痛小指次指不用腹氣滿小腹尤堅不得小便溢則水留即為脹盛者人迎大一倍於寸口虛者人迎反小於寸口也膽足少陽之脈起於目銳眥上抵頭角下耳後循頸至肩上入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下人迎合手少陽抵䪼下頰車合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入牌厭中即髀樞其直者從缺盆下腋循胸過季脅下合髀厭中出膝外廉循足跗入小指次指之間其支者別足跗入大指間是動則病口苦膽病則液泄故口苦嘔宿汁善太息膽鬱則氣不舒故善太息驚惕心下澹澹恐人將捕之咽中介介然數唾心脅痛不能轉側足少陽之別貫心循肋里故病則不能轉側耳無所聞甚則面有微塵體無膏澤膽病則春升之令不行如木之枝葉凋瘁而色枯槁也足外反熱是為陽厥病本屬火故為陽厥是主筋所生病者肝主筋膽為肝之府故亦主之世本是主骨所生病者誤頭角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧膽居表裡之半陰勝則振寒陽勝則汗出故瘧胸脅膝脛踝前諸節皆痛小指次指不用少陽終者耳聾百節盡縱目系絕盛者人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指上循足跗上膕內廉循陰股環陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上取頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病閉目不欲見人腰痛不可俯仰痛上熱丈夫頹疝婦人少腹腫甚則咽乾面塵脫色淅淅時寒熱兩脅下痛引少腹上下無常處淋溲便難脅痛支滿手足青面青唇黑是主肝所生病者胸滿嘔逆作酸飧泄狐疝遺溺閉癃頰腫喉痹吐膿血吐血下血暴湧不止瘛瘲惡風渾身痠麻疼痛四肢滿悶筋痿不能起陰縮兩筋急轉筋足逆冷脛酸陰癢盛則善怒忽忽眩冒眩暈也而巔疾巔頂痛也氣逆則頭痛耳聾目赤腫痛虛則目𥉂𥉂無所見耳無所聞善恐如人將捕之善恐如人將捕有三足少陰是腎藏精氣虛衰足少陽是膽虛寒涎漬沃足厥陰是肝虛神魂不寧一屬精傷一屬涎沫一屬血虛不可不辨氣絕則筋急引舌與卵唇青盛者寸口大一倍於人迎虛者寸口反小於人迎也奇經脈有奇常十二經者常脈也所見諸症皆平常無奇其奇經八脈交加中外絡繹諸經所見諸症皆忽起忽伏脈亦倏去倏來故謂之奇舊說以為奇偶之奇恐非至當若而則不應有陰陽維蹻音竅平聲之偶矣所謂督脈督於身後諸陽任脈任於身前諸陰沖為諸脈之海又為血海陽維維絡諸陽主一身之表陰維維絡諸陰主一身之裡陽蹻得足太陽之別主一身左右諸陽陰蹻得足少陰之別主一身左右諸陰二蹻皆起跟中使人蹻捷帶脈橫束季脅約束諸脈為諸經之別貫各有專司蓋人身之氣血常行於十二經而後及於八脈若受邪則先傷八脈而後傳次六經所以越人譬之溝渠溝渠滿溢諸經不能復拘也督脈起於下極之俞音殊並於脊裡上至風府項中央之脈督脈也名曰風府入屬於腦陽脈之海也其絡循陰器合篡間繞篡後繞臀至少陰與巨陽中合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之內中央動苦少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾卒口噤背反張瘛瘲腰背強痛不得俯仰脊強反折及痛頭重不舉大人癲疾小兒風癇其脈直上直下而中央浮或尺寸強俱直而浮者直督脈也任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目絡舌陰脈之海也同足三陰並行腹裡其浮於外者出毛際循關元石門即丹田氣海而歷三脘循膻中至缺盆缺盆之中任脈也名曰天突動苦少腹繞臍引陰中切痛入房太過沖督任受傷多此男子內結七疝女子帶下瘕聚月事不以時下腹皮急腹中有氣如指上搶心不得俯仰拘急志欲不遂陰火上乘多此其脈橫寸口邊丸丸緊細而長或弦出寸口上魚際而丸滑者任脈也衝脈起於少腹之內胞中為血之海也其浮於外者起於氣街即氣衝在少腹並足少陰之經難經云並足陽明之經以穴考之足陽明挾臍各二寸而下行與衝脈會於宗筋足少陰挾臍五分而上行針經所載衝脈在腹關元等穴皆屬少陰非陽明也明矣挾臍上行至胸中而散衝脈任脈皆起於胞中上循背裡為經絡之海動苦逆氣裡急氣上衝咽喉不得息喘息有音不得臥腹中刺痛拘急寒氣客於衝脈則脈不通故喘動應手有寒疝痛則上引胸中也其脈直上直下而中央牢者衝脈也凡有兩手脈浮之俱有陽沉之俱有陰陰陽皆盛此沖督之脈也沖主沉牢督主浮革沖督為十二經之道路沖督用事則十二經不復朝於寸口其人恍惚癡狂刺沖督陽維起於諸陽之會諸陽皆會於頭主持衛氣其脈發於足太陽外踝循膝外廉上髀關抵少腹側循脅肋斜上肘會手足太陽陽蹻於臑俞在背後胛上谷中上循耳會督脈於風府上腦空下至風池與諸陽會於頭動苦寒熱陽維為病在表故苦寒熱而足太陽少陽始終聯附故二經為病苦寒熱腰痛痛上怫然腫又腰痛不可以咳咳則筋縮急肌肉痹癢皮膚痛下部不仁汗出而寒羊癇倒僕多發於日手足相引甚者不能言若陽維不能維於陽則溶溶不能自收持溶溶緩縱貌其脈從尺外斜上至寸而浮者陽維也陰維起於諸陰之交諸陰皆交於胸主持營血其脈發於足少陰內踝循股內廉上行入少腹會足三陰上腹裡去腹中行四寸半循脅會足厥陰於期門直乳下一寸半上胸脅挾咽與任脈會於頸動苦心痛陰維為病在裡故苦心痛陰維雖交三陰與任脈同歸故心痛腹痛多屬少陰而兼陰維任脈也脅滿腰痛甚則悲以恐癲疾失音多發於夜肌肉痹癢汗出惡風身洗洗然洗與灑同若陰維不能維於陰則悵然失志其脈從尺內斜上至寸而沉實者陰維也陽蹻起於跟內出外踝直上循股外廉循脅後胛上行肩膊外上挾口吻至目內上行髮際後入風池動苦緩縱不收陰緩而陽急陽蹻脈急當從外踝以上急內踝以上緩腰背痛羊癇倒僕多發於日惡風偏枯𤸷痹體強目瞋不得瞑其脈寸口左右彈浮而細綿綿者陽蹻也陰蹻起於然谷之後上內踝之上直上循陰股入陰中上循胸裡入缺盆上出人迎之前入鼻屬目內眥至咽喉交貫衝脈動苦拘急不弛陽緩而陰急陰蹻脈急當從內踝以上急外踝以上緩少腹痛裡急腰痛相引陰中男子陰疝女子漏下不止癲疾寒熱多發於夜皮膚淫痹風痙瘛瘲目閉不能開其脈尺內左右彈沉而細綿綿者陰蹻也帶脈起於季肋圍身一周如束帶然與足少陰會於十四椎自上而下則十四椎處下而上則七節十二經與奇經七脈皆上下周流惟帶脈橫束如帶而衝任二脈循腹脅夾臍旁傳流於氣衝屬於帶脈絡於衝脈沖督任三脈同起而異行一源而三歧皆絡帶脈動苦腹滿腰溶溶若坐水中腰腹縱如囊水狀婦人腰痛少腹痛裡急瘛瘲牽引季脅下空軟處月水不調赤白帶下其脈中部左右彈而橫滑者帶脈也運氣諺云不讀五運六氣檢遍方書何濟所以稍涉醫理者動以司運為務曷知天元紀等篇本非素問原文王氏取陰陽大論補入經中後世以為古聖格言孰敢非之其實無關於醫道也況論中明言時有常位而氣無必然猶諄諄詳論者不過窮究其理而已縱使勝復有常而政分南北四方有高下之殊四序有非時之化百步之內晴雨不同千里之外寒暄各異豈可以一定之法而測非常之變耶故余僅取司運規例詳釋其義以資顧問其六元正紀中之某歲某氣當見某病世所最重者概不採錄甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之五運之化有常數主客之運有之遞代蓋六氣之有主客五運亦有主客主運皆起於角以次相生如木主春令而為角火主夏令而為徵土主長夏而為宮金主秋令而為商水主冬令而為羽每運得七十三日五刻與六步主氣同但歲氣有陰陽主運分太少假如甲年為陽土則主運始太角而生少徵太宮少商太羽己為陰土則主運始少角而生太徵少宮太商少羽此主運之氣必始於角而終於羽也客運亦一年五步假如甲己為土運甲屬陽土甲年則太宮為初運少商為二運太羽為三運少角為四運太徵為終運己屬陰土己年則少宮為初運太商為二運少羽為三運太角為四運少徵為終運太少相生凡十年一主令而竟天干也但主運則必始於角而終於羽客運則以本年中運為初運以次相生此主運客運之年以有異也子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰主氣者地氣也如厥陰風木主初氣少陰君火為二氣少陽相火為三氣太陰濕土為四氣陽明燥金為五氣太陽寒水為終氣君相二火相隨為一歲之主有常無變故少陽相火繼君火行令循序而生濕土所以太陰土居相火之後氣之順行者也客氣者天氣也如子午則太陽為初氣厥陰為二氣少陰為三氣太陰為四氣少陽為五氣陽明為終氣丑未則厥陰為初氣寅申則少陰為初氣卯酉則太陰為初氣辰戌則少陽為初氣巳亥則陽明為初氣蓋初氣皆起地之左間也而客氣之濕土居相火之前乃陰陽先後之數也按六氣分正化對化如子醜寅卯辰巳為對化對司化令之虛則勝而有復午未申酉戌亥為正化正司化令之實則勝而不復帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也帝曰願聞其道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝也有勝則復無勝則否帝曰天地之氣何以候之岐伯曰天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也帝曰問氣如何岐伯曰隨氣所在期於左右帝曰期之奈何岐伯曰從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死先立其年以知其氣左右應見然後乃可以言死生逆順也論言人迎與寸口相應若引繩大小齊等命曰平陰之所在寸口何如岐伯曰視歲南北可知矣甲子甲午南政少陰司天陽明在泉則兩寸不應初氣太陽二氣厥陰三氣少陰四氣太陰五氣少陽終氣陽明己巳己亥南政厥陰司天少陽在泉則右寸不應初氣陽明二氣太陽三氣厥陰四氣少陰五氣太陰終氣少陽己丑己未南政太陰司天太陽在泉則左寸不應初氣厥陰二氣少陰三氣太陰四氣少陽五氣陽明終氣太陽己卯己酉南政少陰在泉陽明司天則兩尺不應初氣太陰二氣少陽三氣陽明四氣太陽五氣厥陰終氣少陰甲寅甲申南政厥陰在泉少陽司天則左尺不應初氣少陰二氣太陰三氣少陽四氣陽明五氣太陽終氣厥陰甲辰甲戌南政太陰在泉太陽司天則右尺不應初氣少陽二氣陽明三氣太陽四氣厥陰五氣少陰終氣太陰丙戊庚壬子午北政少陰司天陽明在泉則兩尺不應初氣太陽二氣厥陰三氣少陰四氣太陰五氣少陽終氣陽明乙辛丁癸已亥北政厥陰司大少陽在泉則兩尺不應初氣陽明二氣太陽三氣厥陰四氣少陰五氣太陰終氣少陽乙辛丁癸丑未北政太陰司天太陽在泉則右尺不應初氣厥陰二氣少陰三氣太陰四氣少陽五氣陽明終氣太陽乙辛丁癸丑酉北政少陰在泉陽明司天則兩寸不應初氣太陰二氣少陽三氣陽明四氣太陽五氣少陰終氣少陰丙戊庚壬辰申北政厥陰在泉少陽司天則右寸不應初氣少陰二氣太陰三氣少陽四氣陽明五氣太陽終氣厥陰丙戊庚壬辰戊北政太陰在泉太陽司天則左寸不應初氣少陽二氣陽明三氣太陽四氣厥陰五氣少陰終氣太陰諸不應者反其診則見矣司天在泉四間氣者客氣之六步也凡初氣為左間二氣為右間三氣為司天四氣為左間五氣為右間終氣為在泉故曰司左右者為間氣每氣各主一步又司天主上半年在泉主下半年故曰歲半已前天氣主之歲半以後地氣主之南北政者即甲已為南政余為北政是也謂南政之年南面行令其氣在南故寸為上而尺為下左右俱同北政之年北面受令其氣在北故尺應上而寸應下是以司天應兩尺在泉應兩寸也脈不應者指少陰所居之處而言故曰陰之所在而三陰以少陰居中太陰居左厥陰居右隨南北二政以定上下也故曰諸不應者反其診則見矣反其診者謂南北相反而診之北政之年少陰司大則兩尺不應太陰司天則少陰在右所以右尺不應厥陰司天則少陰在左所以左尺不應南政之年少陰在泉則兩尺不應太陰在泉則少陰在右所以右尺不應厥陰在泉則少陰在左所以左尺不應也厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒以所臨藏位命其病者也厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者病死大寒至春分為初之氣厥陰風水主令其脈乍大乍小乍短乍長春分至小滿為二之氣少陰君火主令其脈浮大而短小滿至大暑為三之氣少陽相火主令其脈洪大而長大暑至秋分為四之氣太陰濕土主令其脈緩大而長秋分至小雪為五之氣陽明燥金主令其脈緊細而微小雪至大寒為終之氣太陽寒水主令其脈沉短而敦方宜醫以天下民生為己任當具通天下之才識非膠執一己之見固守一隅之法者之所能管窺也吾吳為五方雜處之地南北士商雲集苟未明水土之剛柔風氣之強弱資稟之偏勝而欲妄治遐方遊客或客遊他地治病則與圓枘方鑑何異哉況客遊治病與治遊客之病其法懸殊設遊藝他方惟隨其地之風土若遐方流寓又須詳彼處之資稟此地之風土方始合宜故經有一病而治各不同地勢使然之語圓機之士能於是觸類旁推匪特行之方內雖廣諸異域可以無間然矣東方發育之地土膏氣澤冬鮮凜冽之寒四序常行春令俗尚華而少實病多熱中疏理而無真中風寒即使外感內傷總由理疏邪入中熱氣傷所致詳熱中疏理四字已道盡東方元氣病情矣按吳越皆居東方而江南元氣最薄病則虛熱居多溫順為宜苦寒切禁江北則接壤東魯其間元氣虛實兼半寒熱補瀉隨宜江左地氣稍厚略覺奈病勝藥江右則南近閩粵內連荊楚得火上之餘氣是以不任溫補然亦不勝峻攻惟清理中外為宜大抵東方所稟孱弱宜宗東垣復庵而丹溪則宜於江之左右新甫則偏宜江南若河間戴人之法非西北資稟剛厚人斷斷不可效用也南方長養之處陽盛氣泄窮冬恆服絺衣四序常行夏令繆仲淳云陽燠既泄則使人本氣不堅民雖致理而霧露不時蒸發人觸之者未免多攣痹之患其稍不致者則有瘴癘之虞矣即居恆無病之人氣多上壅而少下降以故時嚼檳榔唾皆赤色是以土人有天蠻不下雪地蠻不落葉人蠻日吐血之語其患瘴癘之症亦發熱頭脹胸滿嘔逆與傷寒相似但治法與傷寒迥異感之輕者但食檳榔祛散滯氣胸膈寬舒即愈重則必需芳香正氣之劑開發中氣為主若誤行表散則陽氣愈泄表氣愈虛邪乘虛擾發熱愈無抵止矣凡嶺南煙瘴之鄉天晴亦多霧露罕見日色嵐濕與醃暖交升蠱毒與鬼蜮並瘧感之必內應濕土中氣先傷故瘴癘之治與疫癘彷彿但廣粵正向離明黔滇斜臨坤位咸多濕熱氣蒸閩雖未逾梅嶺已得南方氣候水土皆泄而不收縱有大頭瘟蝦蟆瘟等疫悉屬陽邪其毒亦易解散非若北方之地脈堅厚陰邪積而不發發則旦發夕死如疙瘩瘟黑骨瘟等症之暴絕也西方收引之界金沙之域地高土厚多風四序常行秋令其俗剛毅而不阿其民不衣而褐薦華實而脂肥則知西域稟賦與關西無異然蜀直指兌澤元氣與人文俱厚有峽三倒流之勢關西正當北斗地氣與人文俱偉有劍倚崆峒之概以其材質俱俊表裡俱充故邪弗能傷之也惟是內氣壅盛故治宜毒藥如西域倒倉子和漏下等法觀內經病生於內治宜毒藥一方風氣主治了無餘蘊矣北方閉藏之境陰盛氣沉春夏草木不生四序常行冬令民稟坎水而生故常以水為事且性好乳食所以藏寒生滿則內因之症也至於樂野處冒風沙歷冰雪其寒可以斷指裂膚反不言傷寒之病者以致理慣拒嚴寒雖有大風苛毒弗之能害即得傷之其氣堅固不能便入於裡故感之輕者但需雞湯麥食助其肝實其胃自能祛邪作汗若傷之重者竟行辛熱表散裡氣壅滯便與苦寒峻攻非若東南之元氣瘠薄投劑稍重便致變症蜂起也惟是腎氣素勞之人邪乘虛入而為卒中之患者是必峻用溫補然煤火內蘊須兼苦降之味以防火炎竭澤之虞蓋煤為水土之精人食其長氣於陰中之陽所以力能壯火傷陰可不預為調製乎復有車塵馬足之勞不內外因之候又宜導氣和中不宜升發溫補若以南方內傷勞倦例治之愈益其壅滿矣然燕與晉魯皆北燕則左訶右岱地氣最厚魯雖偏居艮土風氣已北晉抵關西惟一河之限元氣之充實大率相類其治亦相類中央正中之位水土平濕萬類各得其和四序各行其令民雖食雜不勞而多痿厥寒熱者良由水土平濕使然以其食雜不勞元氣平治所傷亦輕故導引按蹻便可愈之不必毒藥內治針石外治也然此言平氣所致若傷寒卒病其可拘於此例乎蓋中央雖居正位四維八埏之氣皆得干之所以仲景有寒熱補瀉之不同立法皆隨病制宜以為天下萬世則而於中州更宜按仲景為南陽聖醫吏治長沙皆不離洛楚之地夫洛與楚皆居中央而楚則交界江右稍偏於南所以一切溫補皆為掣肘以其地氣渾厚民多溫飽是以不須補益洛則水土平濕平濕則氣柔氣柔則受補矣經言治所以異而病皆愈者得病之情知治之大體也
